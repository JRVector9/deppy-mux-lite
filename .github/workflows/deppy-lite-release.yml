name: Release deppy-lite macOS apps

on:
  push:
    tags:
      - "deppy-lite-v*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CREATE_DMG_VERSION: 8.0.0
  DEPPY_LITE_ARM64_DMG_ASSET: deppy-mux-lite-arm64.dmg
  DEPPY_LITE_UNIVERSAL_DMG_ASSET: deppy-mux-lite-universal.dmg
  DEPPY_LITE_ARM64_APPCAST_ASSET: appcast-arm64.xml
  DEPPY_LITE_UNIVERSAL_APPCAST_ASSET: appcast-universal.xml
  DEPPY_WEB_CONNECT_RUNTIME_ARM64_ASSET: deppy-web-connect-runtime-arm64.zip
  DEPPY_WEB_CONNECT_RUNTIME_X86_64_ASSET: deppy-web-connect-runtime-x86_64.zip

jobs:
  guard-release-assets:
    runs-on: ${{ vars.LINUX_RUNNER || 'blacksmith-4vcpu-ubuntu-2404' }}
    outputs:
      skip_all: ${{ steps.guard.outputs.skip_all }}
      skip_upload: ${{ steps.guard.outputs.skip_upload }}
      release_state: ${{ steps.guard.outputs.release_state }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history + tags so the version guard can compare
          # DEPPY_LITE_VERSION against every previously tagged release.
          fetch-depth: 0

      - name: Guard deppy-lite version bump
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/deppy-lite-pretag-guard.sh

      - name: Guard immutable deppy-lite release assets
        id: guard
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { evaluateReleaseAssetGuard } = require('./scripts/release_asset_guard');
            const tag = context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : null;
            const immutableAssetNames = [
              process.env.DEPPY_LITE_ARM64_DMG_ASSET,
              process.env.DEPPY_LITE_UNIVERSAL_DMG_ASSET,
              process.env.DEPPY_LITE_ARM64_APPCAST_ASSET,
              process.env.DEPPY_LITE_UNIVERSAL_APPCAST_ASSET,
              process.env.DEPPY_WEB_CONNECT_RUNTIME_ARM64_ASSET,
              process.env.DEPPY_WEB_CONNECT_RUNTIME_X86_64_ASSET,
            ];
            core.setOutput('skip_all', 'false');
            core.setOutput('skip_upload', 'false');
            core.setOutput('release_state', 'clear');
            if (!tag) {
              core.notice('workflow_dispatch is not running from a tag; release guard is in dry-run mode.');
              return;
            }
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              const existingAssetNames = (release.data.assets || []).map((asset) => asset.name);
              const {
                conflicts,
                missingImmutableAssets,
                guardState,
                hasPartialConflict,
                shouldSkipBuildAndUpload,
              } = evaluateReleaseAssetGuard({ existingAssetNames, immutableAssetNames });

              core.setOutput('release_state', guardState);

              if (hasPartialConflict) {
                core.setFailed(
                  `Release ${tag} has a partial immutable asset state. Existing immutable assets: ` +
                  `${conflicts.join(', ')}. Missing immutable assets: ${missingImmutableAssets.join(', ')}. ` +
                  'Resolve release assets manually before rerunning.'
                );
                return;
              }

              if (shouldSkipBuildAndUpload) {
                core.notice(
                  `Release ${tag} already contains immutable assets (${conflicts.join(', ')}). ` +
                  'Skipping build, notarization, and upload to preserve existing signed artifacts.'
                );
                core.setOutput('skip_all', 'true');
                core.setOutput('skip_upload', 'true');
                return;
              }

              core.notice(`Release ${tag} exists but has no immutable deppy-lite assets yet; continuing.`);
            } catch (error) {
              if (error.status === 404) {
                core.notice(`Release ${tag} does not exist yet; safe to build and publish deppy-lite assets.`);
                return;
              }
              throw error;
            }

  build-ghostty-cli-helper:
    needs: guard-release-assets
    if: needs.guard-release-assets.outputs.skip_all != 'true'
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15' }}
    timeout-minutes: 20
    steps:
      - name: Clear stale git locks
        shell: bash
        run: |
          ws="${GITHUB_WORKSPACE:-$PWD}"
          rm -f "$ws/.git/index.lock" 2>/dev/null || true
          if [ -d "$ws/.git/modules" ]; then
            find "$ws/.git/modules" -type f -name "*.lock" -delete 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Build universal Ghostty CLI helper
        run: |
          set -euo pipefail
          mkdir -p ghostty-cli-helper
          ./scripts/build-ghostty-cli-helper.sh --universal --output ghostty-cli-helper/ghostty
          lipo ghostty-cli-helper/ghostty -verify_arch arm64 x86_64
          if /usr/bin/strings ghostty-cli-helper/ghostty | grep -q "ghostty CLI helper stub"; then
            echo "Ghostty helper is a stub" >&2
            exit 1
          fi

      - name: Upload universal Ghostty CLI helper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deppy-lite-ghostty-cli-helper
          path: ghostty-cli-helper/ghostty
          if-no-files-found: error

  build-web-connect-runtime:
    needs: guard-release-assets
    if: needs.guard-release-assets.outputs.skip_all != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ${{ vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15' }}
          - arch: x86_64
            runner: ${{ vars.DEPPY_LITE_MACOS_X86_64_RUNNER || 'macos-15-intel' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Clear stale git locks
        shell: bash
        run: |
          ws="${GITHUB_WORKSPACE:-$PWD}"
          rm -f "$ws/.git/index.lock" 2>/dev/null || true
          if [ -d "$ws/.git/modules" ]; then
            find "$ws/.git/modules" -type f -name "*.lock" -delete 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify runner architecture
        run: |
          set -euo pipefail
          current_arch="$(uname -m)"
          expected_arch="${{ matrix.arch }}"
          if [ "$current_arch" != "$expected_arch" ]; then
            echo "Expected a $expected_arch runner, got $current_arch." >&2
            echo "Set DEPPY_LITE_MACOS_X86_64_RUNNER to an Intel macOS runner for the x86_64 runtime asset." >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build Web Connect runtime archive
        run: |
          set -euo pipefail
          arch="${{ matrix.arch }}"
          asset="deppy-web-connect-runtime-${arch}.zip"
          mkdir -p release-assets
          DEPPY_WEB_CONNECT_ARCHIVE_OUTPUT="$PWD/release-assets/$asset" \
            scripts/install-web-connect-runtime.sh --output "$RUNNER_TEMP/current"

      - name: Verify Web Connect runtime archive
        run: |
          set -euo pipefail
          arch="${{ matrix.arch }}"
          archive="$PWD/release-assets/deppy-web-connect-runtime-${arch}.zip"
          verify_dir="$RUNNER_TEMP/web-connect-runtime-verify"
          rm -rf "$verify_dir"
          mkdir -p "$verify_dir"
          ditto -x -k "$archive" "$verify_dir"
          runtime_dir="$verify_dir/current"
          test -f "$runtime_dir/server.js"
          if [ -x "$runtime_dir/bin/bun" ]; then
            lipo "$runtime_dir/bin/bun" -verify_arch "$arch"
          elif [ -x "$runtime_dir/bin/node" ]; then
            lipo "$runtime_dir/bin/node" -verify_arch "$arch"
          else
            echo "Runtime archive does not contain bin/bun or bin/node" >&2
            exit 1
          fi
          while IFS= read -r -d '' binary; do
            lipo "$binary" -verify_arch "$arch"
          done < <(find "$runtime_dir" -type f \( -name '*.node' -o -name '*.dylib' \) -print0)
          du -sh "$archive"

      - name: Upload Web Connect runtime archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deppy-web-connect-runtime-${{ matrix.arch }}
          path: release-assets/deppy-web-connect-runtime-${{ matrix.arch }}.zip
          if-no-files-found: error

  build-sign-notarize:
    needs:
      - guard-release-assets
      - build-ghostty-cli-helper
      - build-web-connect-runtime
    if: needs.guard-release-assets.outputs.skip_all != 'true'
    runs-on: ${{ vars.MACOS_RUNNER_26_RELEASE || 'blacksmith-6vcpu-macos-26' }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: arm64
            script: scripts/build-deppy-lite-arm64-release.sh
            derived_data: build-deppy-lite-arm64
            app_path: build-deppy-lite-arm64/Build/Products/Release/deppy-mux-lite.app
            dmg_name: deppy-mux-lite-arm64.dmg
            appcast_name: appcast-arm64.xml
          - variant: universal
            script: scripts/build-deppy-lite-universal-release.sh
            derived_data: build-deppy-lite-universal
            app_path: build-deppy-lite-universal/Build/Products/Release/deppy-mux-lite-universal.app
            dmg_name: deppy-mux-lite-universal.dmg
            appcast_name: appcast-universal.xml
    steps:
      - name: Clear stale git locks
        shell: bash
        run: |
          ws="${GITHUB_WORKSPACE:-$PWD}"
          rm -f "$ws/.git/index.lock" 2>/dev/null || true
          if [ -d "$ws/.git/modules" ]; then
            find "$ws/.git/modules" -type f -name "*.lock" -delete 2>/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: ./scripts/select-ci-xcode.sh

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install build deps
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          if ! command -v rustup >/dev/null 2>&1; then
            export HOMEBREW_NO_AUTO_UPDATE=1
            export HOMEBREW_NO_INSTALL_CLEANUP=1
            export HOMEBREW_NO_ENV_HINTS=1
            brew install rustup-init
            rustup-init -y --profile minimal --default-toolchain stable
          fi
          if ! rustup show active-toolchain >/dev/null 2>&1; then
            rustup default stable
          fi
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          CMUX_NODE_BIN="$(command -v node)"
          export npm_config_prefix="$RUNNER_TEMP/npm-global"
          mkdir -p "$npm_config_prefix"
          npm install --global "create-dmg@${CREATE_DMG_VERSION}"
          wrapper_dir="$RUNNER_TEMP/create-dmg-wrapper"
          mkdir -p "$wrapper_dir"
          cat > "$wrapper_dir/create-dmg" <<EOF
          #!/usr/bin/env bash
          exec "$CMUX_NODE_BIN" "$npm_config_prefix/lib/node_modules/create-dmg/cli.js" "\$@"
          EOF
          chmod +x "$wrapper_dir/create-dmg"
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Download pre-built GhosttyKit.xcframework
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .spm-cache
          key: spm-deppy-lite-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-deppy-lite-
            spm-

      - name: Sanitize Swift package cache
        run: python3 scripts/ci/sanitize-xcode-source-packages-cache.py .spm-cache

      - name: Download universal Ghostty CLI helper
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: deppy-lite-ghostty-cli-helper
          path: ghostty-cli-helper

      - name: Download Web Connect runtime archives
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: deppy-web-connect-runtime-*
          path: release-assets
          merge-multiple: true

      - name: Build deppy-lite app
        run: |
          set -euo pipefail
          DERIVED_DATA="$PWD/${{ matrix.derived_data }}" \
          DEPPY_LITE_GHOSTTY_HELPER_PATH="$PWD/ghostty-cli-helper/ghostty" \
          "${{ matrix.script }}"

      - name: Verify deppy-lite release inputs
        run: |
          set -euo pipefail
          APP_PATH="${{ matrix.app_path }}"
          CLI_BIN="$APP_PATH/Contents/Resources/bin/deppy-cli"
          HELPER_BIN="$APP_PATH/Contents/Resources/bin/ghostty"
          test -d "$APP_PATH"
          test ! -e "$APP_PATH/Contents/Resources/web-connect"
          lipo "$CLI_BIN" -verify_arch arm64
          if [ "${{ matrix.variant }}" = "universal" ]; then
            APP_BIN="$APP_PATH/Contents/MacOS/deppy-mux-lite-universal"
            lipo "$APP_BIN" -verify_arch arm64 x86_64
            lipo "$CLI_BIN" -verify_arch x86_64
            lipo "$HELPER_BIN" -verify_arch arm64 x86_64
          else
            APP_BIN="$APP_PATH/Contents/MacOS/deppy-mux-lite"
            lipo "$APP_BIN" -verify_arch arm64
            lipo "$HELPER_BIN" -verify_arch arm64
          fi
          test -f "release-assets/$DEPPY_WEB_CONNECT_RUNTIME_ARM64_ASSET"
          test -f "release-assets/$DEPPY_WEB_CONNECT_RUNTIME_X86_64_ASSET"

      - name: Import signing cert
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE_BASE64:-}" ]; then
            echo "Missing APPLE_CERTIFICATE_BASE64 secret" >&2
            exit 1
          fi
          if [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing APPLE_CERTIFICATE_PASSWORD secret" >&2
            exit 1
          fi
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/deppy-lite-cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/deppy-lite-cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          ./scripts/import-apple-developer-id-intermediates.sh build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Codesign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "Missing APPLE_SIGNING_IDENTITY secret" >&2
            exit 1
          fi
          CMUX_REQUIRE_WEBAUTHN_ENTITLEMENT=0 ./scripts/sign-cmux-bundle.sh \
            "${{ matrix.app_path }}" \
            deppy-lite.release.entitlements \
            "$APPLE_SIGNING_IDENTITY"

      - name: Notarize app and DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Missing notarization secrets (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)" >&2
            exit 1
          fi
          APP_PATH="${{ matrix.app_path }}"
          ZIP_SUBMIT="deppy-lite-${{ matrix.variant }}-notary.zip"
          DMG_RELEASE="${{ matrix.dmg_name }}"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_SUBMIT"
          APP_SUBMIT_JSON="$(xcrun notarytool submit "$ZIP_SUBMIT" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
          APP_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$APP_SUBMIT_JSON")"
          APP_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$APP_SUBMIT_JSON")"
          if [ "$APP_STATUS" != "Accepted" ]; then
            echo "App notarization failed with status: $APP_STATUS" >&2
            xcrun notarytool log "$APP_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv --type execute "$APP_PATH"
          rm -f "$ZIP_SUBMIT"

          dmg_tmp_dir="$(mktemp -d)"
          create-dmg --no-code-sign "$APP_PATH" "$dmg_tmp_dir"
          created_dmg="$(find "$dmg_tmp_dir" -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [ -z "$created_dmg" ]; then
            echo "Failed to locate created DMG for $APP_PATH" >&2
            exit 1
          fi
          mv "$created_dmg" "$DMG_RELEASE"
          rm -rf "$dmg_tmp_dir"
          /usr/bin/codesign --force --timestamp --keychain build.keychain \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_RELEASE"
          /usr/bin/codesign --verify --verbose=2 "$DMG_RELEASE"
          DMG_SUBMIT_JSON="$(xcrun notarytool submit "$DMG_RELEASE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
          DMG_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$DMG_SUBMIT_JSON")"
          DMG_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$DMG_SUBMIT_JSON")"
          if [ "$DMG_STATUS" != "Accepted" ]; then
            echo "DMG notarization failed with status: $DMG_STATUS" >&2
            xcrun notarytool log "$DMG_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "$DMG_RELEASE"
          xcrun stapler validate "$DMG_RELEASE"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.DEPPY_LITE_SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SPARKLE_PRIVATE_KEY:-}" ]; then
            echo "Missing DEPPY_LITE_SPARKLE_PRIVATE_KEY secret" >&2
            exit 1
          fi
          TAG="${GITHUB_REF_NAME:-deppy-lite-dry-run}"
          DOWNLOAD_URL_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/" \
            RELEASE_NOTES_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}" \
            ./scripts/sparkle_generate_appcast.sh "${{ matrix.dmg_name }}" "$TAG" "${{ matrix.appcast_name }}"
          grep -q 'sparkle:edSignature' "${{ matrix.appcast_name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deppy-lite-${{ matrix.variant }}-dmg
          path: ${{ matrix.dmg_name }}
          if-no-files-found: error

      - name: Upload appcast artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deppy-lite-${{ matrix.variant }}-appcast
          path: ${{ matrix.appcast_name }}
          if-no-files-found: error

  publish:
    needs:
      - guard-release-assets
      - build-sign-notarize
      - build-web-connect-runtime
    if: needs.guard-release-assets.outputs.skip_upload != 'true' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: deppy-lite-*-dmg
          path: release-assets
          merge-multiple: true

      - name: Download appcast artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: deppy-lite-*-appcast
          path: release-assets
          merge-multiple: true

      - name: Download Web Connect runtime artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: deppy-web-connect-runtime-*
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            release-assets/deppy-mux-lite-arm64.dmg
            release-assets/deppy-mux-lite-universal.dmg
            release-assets/appcast-arm64.xml
            release-assets/appcast-universal.xml
            release-assets/deppy-web-connect-runtime-arm64.zip
            release-assets/deppy-web-connect-runtime-x86_64.zip
          generate_release_notes: true
          overwrite_files: false
