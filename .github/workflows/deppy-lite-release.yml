name: Release deppy-lite macOS apps

on:
  push:
    tags:
      - "deppy-lite-v*"
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

env:
  CREATE_DMG_VERSION: 8.0.0

jobs:
  build-ghostty-cli-helper:
    runs-on: ${{ vars.MACOS_RUNNER_15 || 'blacksmith-6vcpu-macos-15' }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install zig
        run: ./scripts/install-zig-ci.sh

      - name: Cache Zig packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Build universal Ghostty CLI helper
        run: |
          set -euo pipefail
          mkdir -p ghostty-cli-helper
          ./scripts/build-ghostty-cli-helper.sh --universal --output ghostty-cli-helper/ghostty
          lipo ghostty-cli-helper/ghostty -verify_arch arm64 x86_64
          if /usr/bin/strings ghostty-cli-helper/ghostty | grep -q "ghostty CLI helper stub"; then
            echo "Ghostty helper is a stub" >&2
            exit 1
          fi

      - name: Upload universal Ghostty CLI helper
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deppy-lite-ghostty-cli-helper
          path: ghostty-cli-helper/ghostty
          if-no-files-found: error

  build-sign-notarize:
    needs: build-ghostty-cli-helper
    runs-on: ${{ vars.MACOS_RUNNER_26_RELEASE || 'blacksmith-6vcpu-macos-26' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: arm64
            script: scripts/build-deppy-lite-arm64-release.sh
            derived_data: build-deppy-lite-arm64
            app_path: build-deppy-lite-arm64/Build/Products/Release/deppy-mux-lite.app
            dmg_name: deppy-mux-lite-arm64.dmg
          - variant: universal
            script: scripts/build-deppy-lite-universal-release.sh
            derived_data: build-deppy-lite-universal
            app_path: build-deppy-lite-universal/Build/Products/Release/deppy-mux-lite-universal.app
            dmg_name: deppy-mux-lite-universal.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Select Xcode
        run: ./scripts/select-ci-xcode.sh

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install build deps
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          if ! command -v rustup >/dev/null 2>&1; then
            export HOMEBREW_NO_AUTO_UPDATE=1
            export HOMEBREW_NO_INSTALL_CLEANUP=1
            export HOMEBREW_NO_ENV_HINTS=1
            brew install rustup-init
            rustup-init -y --profile minimal --default-toolchain stable
          fi
          if ! rustup show active-toolchain >/dev/null 2>&1; then
            rustup default stable
          fi
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          CMUX_NODE_BIN="$(command -v node)"
          export npm_config_prefix="$RUNNER_TEMP/npm-global"
          mkdir -p "$npm_config_prefix"
          npm install --global "create-dmg@${CREATE_DMG_VERSION}"
          wrapper_dir="$RUNNER_TEMP/create-dmg-wrapper"
          mkdir -p "$wrapper_dir"
          cat > "$wrapper_dir/create-dmg" <<EOF
          #!/usr/bin/env bash
          exec "$CMUX_NODE_BIN" "$npm_config_prefix/lib/node_modules/create-dmg/cli.js" "\$@"
          EOF
          chmod +x "$wrapper_dir/create-dmg"
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Download pre-built GhosttyKit.xcframework
        run: ./scripts/download-prebuilt-ghosttykit.sh

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .spm-cache
          key: spm-deppy-lite-${{ hashFiles('cmux.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-deppy-lite-
            spm-

      - name: Sanitize Swift package cache
        run: python3 scripts/ci/sanitize-xcode-source-packages-cache.py .spm-cache

      - name: Download universal Ghostty CLI helper
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: deppy-lite-ghostty-cli-helper
          path: ghostty-cli-helper

      - name: Build deppy-lite app
        run: |
          set -euo pipefail
          DERIVED_DATA="$PWD/${{ matrix.derived_data }}" \
          DEPPY_LITE_GHOSTTY_HELPER_PATH="$PWD/ghostty-cli-helper/ghostty" \
          "${{ matrix.script }}"

      - name: Import signing cert
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE_BASE64:-}" ]; then
            echo "Missing APPLE_CERTIFICATE_BASE64 secret" >&2
            exit 1
          fi
          if [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "Missing APPLE_CERTIFICATE_PASSWORD secret" >&2
            exit 1
          fi
          KEYCHAIN_PASSWORD="$(uuidgen)"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > /tmp/deppy-lite-cert.p12
          security delete-keychain build.keychain >/dev/null 2>&1 || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/deppy-lite-cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          ./scripts/import-apple-developer-id-intermediates.sh build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Codesign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "Missing APPLE_SIGNING_IDENTITY secret" >&2
            exit 1
          fi
          CMUX_REQUIRE_WEBAUTHN_ENTITLEMENT=0 ./scripts/sign-cmux-bundle.sh \
            "${{ matrix.app_path }}" \
            deppy-lite.release.entitlements \
            "$APPLE_SIGNING_IDENTITY"

      - name: Notarize app and DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Missing notarization secrets (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)" >&2
            exit 1
          fi
          APP_PATH="${{ matrix.app_path }}"
          ZIP_SUBMIT="deppy-lite-${{ matrix.variant }}-notary.zip"
          DMG_RELEASE="${{ matrix.dmg_name }}"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_SUBMIT"
          APP_SUBMIT_JSON="$(xcrun notarytool submit "$ZIP_SUBMIT" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
          APP_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$APP_SUBMIT_JSON")"
          APP_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$APP_SUBMIT_JSON")"
          if [ "$APP_STATUS" != "Accepted" ]; then
            echo "App notarization failed with status: $APP_STATUS" >&2
            xcrun notarytool log "$APP_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vv --type execute "$APP_PATH"
          rm -f "$ZIP_SUBMIT"

          dmg_tmp_dir="$(mktemp -d)"
          create-dmg --no-code-sign "$APP_PATH" "$dmg_tmp_dir"
          created_dmg="$(find "$dmg_tmp_dir" -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [ -z "$created_dmg" ]; then
            echo "Failed to locate created DMG for $APP_PATH" >&2
            exit 1
          fi
          mv "$created_dmg" "$DMG_RELEASE"
          rm -rf "$dmg_tmp_dir"
          /usr/bin/codesign --force --timestamp --keychain build.keychain \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$DMG_RELEASE"
          /usr/bin/codesign --verify --verbose=2 "$DMG_RELEASE"
          DMG_SUBMIT_JSON="$(xcrun notarytool submit "$DMG_RELEASE" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --wait --output-format json)"
          DMG_SUBMIT_ID="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["id"])' <<<"$DMG_SUBMIT_JSON")"
          DMG_STATUS="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["status"])' <<<"$DMG_SUBMIT_JSON")"
          if [ "$DMG_STATUS" != "Accepted" ]; then
            echo "DMG notarization failed with status: $DMG_STATUS" >&2
            xcrun notarytool log "$DMG_SUBMIT_ID" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" || true
            exit 1
          fi
          xcrun stapler staple "$DMG_RELEASE"
          xcrun stapler validate "$DMG_RELEASE"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deppy-lite-${{ matrix.variant }}-dmg
          path: ${{ matrix.dmg_name }}
          if-no-files-found: error

  publish:
    needs: build-sign-notarize
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: deppy-lite-*-dmg
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            release-assets/deppy-mux-lite-arm64.dmg
            release-assets/deppy-mux-lite-universal.dmg
          generate_release_notes: true
          overwrite_files: false
